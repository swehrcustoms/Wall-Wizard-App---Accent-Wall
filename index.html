<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#0284c7" />
    <meta name="color-scheme" content="light" />

    <!-- Apple home-screen PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WallWizard" />

    <!-- Apple icons (required for iOS "Add to Home Screen") -->
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

    <!-- Splash-screen background matches brand color so the gap before React boots is invisible -->
    <style>
      body { background: #0284c7; }
    </style>

    <title>WallWizard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
